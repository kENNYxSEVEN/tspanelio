name: Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    name: Build ${{ matrix.name }} executable
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            package_script: package:linux
            asset_glob: release/tspanelio-linux-x64-*

          - name: macOS
            os: macos-latest
            package_script: package:macos
            asset_glob: release/tspanelio-macos-x64-*

          - name: Windows
            os: windows-latest
            package_script: package:windows
            asset_glob: release/tspanelio-win-x64-*.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build executable
        run: npm run ${{ matrix.package_script }}

      - name: Show release output
        shell: bash
        run: |
          echo "Release directory:"
          ls -la release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
          files: ${{ matrix.asset_glob }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
